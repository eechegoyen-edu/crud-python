<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3 mb-4" style="border-bottom: 3px solid #0d6efd; font-family: sans-serif;">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold d-flex align-items-center me-4" href="/" style="text-decoration: none;">
            <i class="bi bi-building-gear text-primary me-2 fs-4"></i>
            <span class="text-white">Sistema</span><span class="text-primary">Residencias</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavHeader">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavHeader">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2">
                <li class="nav-item">
                    <a class="nav-link px-3 rounded-2 text-white-50 enlace-menu-custom" href="/prorrogas" style="text-decoration: none;">
                        <i class="bi bi-calendar-check me-1"></i> Prórrogas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 rounded-2 text-white-50 enlace-menu-custom" href="/reevaluaciones" style="text-decoration: none;">
                        <i class="bi bi-clipboard-pulse me-1"></i> Reevaluaciones
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-3 border-start border-secondary ps-lg-4 ms-lg-2 mt-3 mt-lg-0">
                {% if current_user.is_authenticated %}
                    <div class="d-flex align-items-center text-light me-2">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-2 shadow-sm" style="width: 32px; height: 32px;">
                            <i class="bi bi-person-fill small"></i>
                        </div>
                        <span class="small fw-semibold text-white-50">Hola, <strong class="text-white">{{ current_user.nombre }}</strong></span>
                    </div>
                        <a href="/cambiar_clave" class="btn btn-outline-success btn-sm px-3 fw-bold d-flex align-items-center gap-1 shadow-sm" style="border-radius: 8px; text-decoration: none;">
                        <i class="bi bi-box-arrow-right"></i>Cambiar pass
                        <a href="/dashboard" class="btn btn-outline-primary btn-sm px-3 fw-bold d-flex align-items-center gap-1 shadow-sm" style="border-radius: 8px; text-decoration: none;">
                        <i class="bi bi-box-arrow-right"></i>Administración
                    <a href="/logout" class="btn btn-outline-danger btn-sm px-3 fw-bold d-flex align-items-center gap-1 shadow-sm" style="border-radius: 8px; text-decoration: none;">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<style>
    .enlace-menu-custom:hover {
        background-color: rgba(255, 255, 255, 0.08) !important;
        color: #fff !important;
        transition: all 0.2s ease;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
