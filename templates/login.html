<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - Residencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card shadow-lg border-0 p-4" style="max-width: 400px; width: 100%; border-radius: 16px;">
    <div class="text-center mb-4">
        <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-3 shadow">
            <i class="bi bi-shield-lock-fill fs-3"></i>
        </div>
        <h4 class="fw-bold text-secondary mb-1">Sistema de Residencias</h4>
        <p class="text-muted small">Iniciá sesión para gestionar prórrogas y reevaluaciones</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">Correo Electrónico</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control border-start-0 ps-0" name="correo" placeholder="usuario@correo.com" required style="border-radius: 0 8px 8px 0;">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">Contraseña</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-key"></i></span>
                <input type="password" class="form-control border-start-0 ps-0" name="password" placeholder="••••••••" required style="border-radius: 0 8px 8px 0;">
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm" style="border-radius: 8px;">
            <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar al Sistema
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
