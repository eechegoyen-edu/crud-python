<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Referentes - Residencias</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="container my-5">
      <div class="mb-3">
        <a
          href="{{ url_for('dashboard') }}"
          class="btn btn-sm btn-outline-secondary"
        >
          <i class="bi bi-arrow-left"></i> Volver al Panel Principal
        </a>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card shadow-lg border-0 p-4" style="border-radius: 16px">
            <div class="text-center mb-4">
              <div
                class="bg-success text-white d-inline-block p-3 rounded-circle mb-3 shadow"
              >
                <i class="bi bi-mortarboard-fill fs-3"></i>
              </div>
              <h4 class="fw-bold text-secondary mb-1">Agregar Referente</h4>
              <p class="text-muted small">Apellido y nombre</p>
            </div>

            <form method="POST">
              <div class="mb-3">
                <label class="form-label fw-bold"
                  >Apellido y nombre del referente</label
                >
                <input
                  type="text"
                  class="form-control"
                  name="referente"
                  placeholder=""
                  required
                />
              </div>

              <button
                type="submit"
                class="btn btn-success w-100 fw-bold shadow-sm"
              >
                <i class="bi bi-plus-circle-fill me-2"></i> Guardar Referente
              </button>
            </form>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-lg border-0 p-4" style="border-radius: 16px">
            <div class="text-center mb-4">
              <div
                class="bg-secondary text-white d-inline-block p-3 rounded-circle mb-3 shadow"
              >
                <i class="bi bi-list-task fs-3"></i>
              </div>
              <h4 class="fw-bold text-secondary mb-1">
                Referentes Registrados
              </h4>
              <p class="text-muted small">Listado de referentes activos</p>
            </div>

            <div class="table-responsive">
              <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                  <tr>
                    <th style="width: 20%">ID</th>
                    <th>Nombre del Referente</th>
                    <th>ACCION</th>
                  </tr>
                </thead>
                <tbody>
                  {% for ref in lista_referentes %}
                  <tr>
                    <td>{{ ref.id }}</td>
                    <td class="fw-semibold text-dark">{{ ref.referente }}</td>
                    <td class="text-center">
                      <form
                        action="{{ url_for('eliminar_referente', id=ref.id) }}"
                        method="POST"
                        onsubmit="
                          return confirm(
                            '¿Estás seguro de que deseas eliminar este referente?',
                          );
                        "
                        style="display: inline"
                      >
                        <button type="submit" class="btn btn-danger btn-sm">
                          <i class="bi bi-trash"></i> Eliminar
                        </button>
                      </form>
                    </td>
                  </tr>
                  {% else %}
                  <tr>
                    <td colspan="2" class="text-center text-muted">
                      No hay referentes cargados todavía.
                    </td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
