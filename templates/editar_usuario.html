<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Usuario - Sistema de Residencias</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="mb-3">
            <a
              href="{{ url_for('gestionar_usuarios') }}"
              class="btn btn-sm btn-outline-secondary"
            >
              <i class="bi bi-arrow-left"></i> Volver a la lista
            </a>
          </div>

          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h3 class="card-title text-center mb-2">Editar Usuario</h3>
              <p class="text-muted text-center small mb-4">
                Modificá los campos necesarios para actualizar el registro
              </p>
              <hr />

              <form method="POST">
                <div class="mb-3">
                  <label for="nombre" class="form-label fw-bold">Nombre</label>
                  <input
                    type="text"
                    class="form-control"
                    id="nombre"
                    name="nombre"
                    value="{{ usuario.nombre }}"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="correo" class="form-label fw-bold">Correo Electrónico</label>
                  <input
                    type="email"
                    class="form-control"
                    id="correo"
                    name="correo"
                    value="{{ usuario.correo }}"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="sede" class="form-label fw-bold">Sede / Hospital</label>
                  <input
                    type="text"
                    class="form-control"
                    id="sede"
                    name="sede"
                    value="{{ usuario.sede }}"
                    required
                  />
                </div>

                <div class="mb-4">
                  <label for="nivel" class="form-label fw-bold">Nivel de Acceso</label>
                  <select class="form-select" id="nivel" name="nivel" required>
                    <option value="1" {{ 'selected' if usuario.nivel == 1 else '' }}>
                      1 - Gestión de usuarios
                    </option>
                    <option value="2" {{ 'selected' if usuario.nivel == 2 else '' }}>
                      2 - Evaluador / Consultas
                    </option>
                  </select>
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle-fill"></i> Guardar Cambios
                  </button>
                  <a
                    href="{{ url_for('gestionar_usuarios') }}"
                    class="btn btn-light border"
                  >
                    Cancelar
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
