<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Usuarios - Residencias</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="container my-5">
      <div class="row g-4">
        <!-- Card de carga de datos -->
        <div class="col-md-4">
          <div
            class="card shadow-lg border-0 p-4 h-100"
            style="border-radius: 16px"
          >
            <div class="text-center mb-3">
              <div
                class="bg-primary text-white d-inline-block p-3 rounded-circle mb-3 shadow"
              >
                <i class="bi bi-person-plus-fill fs-3"></i>
              </div>
              <h5 class="fw-bold text-secondary">Agregar Usuario</h5>
            </div>

            <form method="POST">
              <div class="mb-3">
                <label class="form-label fw-bold">Nombre</label>
                <input
                  type="text"
                  class="form-control"
                  name="nombre"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Correo</label>
                <input
                  type="email"
                  class="form-control"
                  name="correo"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Sede</label>
                <input type="text" class="form-control" name="sede" required />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Contraseña</label>
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Nivel</label>
                <select class="form-select" name="nivel" required>
                  <option value="1">1 - Gestión de usuarios</option>
                  <option value="2">2 - Carga de datos</option>
                  <option value="3">3 - Consulta</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary w-100 fw-bold">
                <i class="bi bi-person-plus-fill me-2"></i> Agregar Usuario
              </button>
            </form>
          </div>
        </div>

        <!-- Card de usuarios registrados -->
        <div class="col-md-8">
          <div
            class="card shadow-lg border-0 p-4 h-100"
            style="border-radius: 16px"
          >
            <div class="text-center mb-3">
              <div
                class="bg-success text-white d-inline-block p-3 rounded-circle mb-3 shadow"
              >
                <i class="bi bi-people-fill fs-3"></i>
              </div>
              <h5 class="fw-bold text-secondary">Usuarios Registrados</h5>
            </div>

            <div class="table-responsive">
              <table class="table table-striped table-hover align-middle">
                <thead class="table-success">
                  <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Sede</th>
                    <th>Nivel</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  {% for u in usuarios %}
                  <tr>
                    <td>{{ u.id }}</td>
                    <td>{{ u.nombre }}</td>
                    <td>{{ u.correo }}</td>
                    <td>{{ u.sede }}</td>
                    <td>{{ u.nivel }}</td>
                    <td>
                      <a
                        href="{{ url_for('editar_usuario', id=u.id) }}"
                        class="btn btn-sm btn-warning"
                      >
                        <i class="bi bi-pencil-square"></i>
                      </a>
                      <form
                        action="{{ url_for('eliminar_usuario', id=u.id) }}"
                        method="POST"
                        style="display: inline"
                      >
                        <button type="submit" class="btn btn-sm btn-danger">
                          <i class="bi bi-trash-fill"></i>
                        </button>
                      </form>
                    </td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
